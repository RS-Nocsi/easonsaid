    <meta property="og:type" content="website">
    <title>EasonSaid</title>

    <link rel="icon" type="image/x-icon" href="https://api.easonsaid.cn/datouzai_icon.php">

<body>
    <!-- 顶栏导航 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">EasonSaid</a>

            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="nav-menu">
                <li class="nav-item">
                    <button class="nav-link" onclick="showModal('about')">关于本站</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="showModal('usage')">使用方法</button>
                </li>

    <!-- 模态框 -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div class="background-overlay"></div>

    <div class="container">
        <header class="header">
            <h1 class="title">EasonSaid</h1>
            <p class="subtitle">每次刷新网页背景都不一样哦<br>按下蓝色的刷新按钮可刷新文本</p>
        </header>

        <main class="main-content">
            <div class="card">
                <div class="card-header">
                    <h2>分享内容</h2>
                    <button id="refresh-btn" class="refresh-btn" aria-label="刷新内容">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M4 4V9H4.58152M19.9381 11C19.446 7.05369 16.0796 4 12 4C8.64262 4 5.76829 6.06817 4.58152 9M4.58152 9H9M20 20V15H19.4185M19.4185 15C18.2317 17.9318 15.3574 20 12 20C7.92038 20 4.55399 16.9463 4.06189 13M19.4185 15H15"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>

                <div class="content-area">
                    <div id="loading" class="loading">
                        <div class="spinner"></div>
                        <p>正在加载分享内容...</p>
                    </div>

                    <div id="content" class="content hidden">
                        <div class="quote-mark start">"</div>
                        <p id="content-text" class="content-text"></p>
                        <div class="quote-mark end">"</div>
                        <div id="content-source" class="content-source"></div>
                    </div>

                    <div id="error" class="error hidden">
                        <p>抱歉，暂时无法获取分享内容，请稍后再试。</p>
                    </div>
                </div>
            </div>
        </main>



        <footer class="footer">
            <b>© <span class="year"></span> EasonSaid By <a href="https://www.rsnocsi.cn" target="_blank"
                    rel="noopener">Abyss</a></b>
            <br>
            <b>Special Thanks to 缪斯茶</b>
            <br>
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">粤ICP备2025432639号-2</a>
        </footer>
    </div>

    <!-- 模态框内容模板 -->
    <template id="tpl-about">
        <h2>关于本站</h2>
        <p>EasonSaid 是<a href="https://www.rsnocsi.cn/" target="_blank">站长Abyss</a>建的一个分享Eason歌词的网站</p>
        <p>在全网（比如说小红书）收集了网友们喜欢的歌词，记录在一个数据库中</p>
        <p>私以为，一群ef通过这种方式分享自己喜欢的歌词，是一个蛮有意义的事情</p>
        <p>Eason的歌词中充满人生百态，当你生活中遇到了什么事情，都可以来这里看看，说不定里面的某一句歌词会触动你</p>
        <p>每次访问都会随机展示不同的背景图片（来源于网络）和分享内容</p>
        <p><b>特别鸣谢：</b><br>感谢各大AI在技术方面提供的巨大支持</p>
        <p>感谢@缪斯茶对本站功能的启发</p>
        <p>持续性收集歌词，欢迎大家留言</p>
        <p>网站功能会不断进行完善，有任何建议欢迎提出！</p>
        <p>本项目代码已在<a href="https://github.com/RS-Nocsi/easonsaid" target="_blank" rel="noopener"><svg width="16"
                    height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px;margin-right:4px">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
                </svg>GitHub</a>完全开源！</p>
    </template>
    <template id="tpl-usage">
        <h2>使用方法</h2>
        <p><strong>刷新内容：</strong>点击蓝色刷新按钮可以随机获取新的歌词，还会注明分享者和歌词出处</p>
        <p><strong>刷新背景：</strong>刷新整个网页会随机更换背景图片（如果是在电脑端，你会注意到每次刷新网站，网站的图标都是不同的大头仔）</p>
        <p><strong>响应式设计：</strong>网站会自动适配你的设备屏幕尺寸。</p>
        <p><strong>横竖屏切换：</strong>旋转设备时会自动切换对应尺寸的背景图片。</p>
    </template>
